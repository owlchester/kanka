services:

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./deploy/nginx/kanka.conf:/etc/nginx/conf.d/default.conf:ro
      - kanka_storage:/var/www/html/storage:ro
    depends_on:
      - app
    networks:
      - kanka

  app:
    build: .
    image: kanka-app:${KANKA_VERSION:-latest}
    restart: unless-stopped
    volumes:
      - kanka_storage:/var/www/html/storage
      - ./.env:/var/www/html/.env:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      meilisearch:
        condition: service_healthy
    networks:
      - kanka

  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - kanka_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - kanka

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - kanka_redis:/data
    networks:
      - kanka

  meilisearch:
    image: getmeili/meilisearch:v1.7
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - kanka_meili:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - kanka

  thumbor:
    image: minimalcompact/thumbor:latest
    restart: unless-stopped
    environment:
      THUMBOR_PORT: 8888
      SECURITY_KEY: ${THUMBOR_SECURITY_KEY}
      LOADER: thumbor.loaders.http_loader
      ALLOW_UNSAFE_URL: "True"
    networks:
      - kanka

  thumbor-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./deploy/nginx/thumbor.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - thumbor
    networks:
      - kanka

volumes:
  kanka_storage:
  kanka_db:
  kanka_redis:
  kanka_meili:

networks:
  kanka:
    driver: bridge
